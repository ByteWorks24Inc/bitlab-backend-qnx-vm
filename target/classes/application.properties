spring.application.name=backend
# ===============================
# SERVER
# ===============================
server.port=8080
server.address=0.0.0.0

# ===============================
# DATABASE CONFIG (RENDER)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/myapp
spring.datasource.username=myuser
spring.datasource.password=mypassword
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ===============================
# FILE UPLOAD LIMITS
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


# ===============================
# SESSION
# ===============================
server.servlet.session.timeout=30m


# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG


# ===============================
# BITLAB CUSTOM CONFIG
# ===============================
bitlab.workspace-root=./workspace
bitlab.execution-timeout-seconds=10

# ===============================
# ACTUATOR & PROMETHEUS
# ===============================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=execution-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.auto-startup=${KAFKA_LISTENER_ENABLED:true}
