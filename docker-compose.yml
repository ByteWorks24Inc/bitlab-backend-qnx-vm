version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./bitlab-backend-qnx-vm
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_LISTENER_ENABLED=false
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/myapp
    depends_on:
      - kafka
      - postgres

  verilog-worker:
    build:
      context: ./bitlab-backend-qnx-vm
      dockerfile: Dockerfile.verilog
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_LISTENER_ENABLED=true
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/myapp
    depends_on:
      - kafka
      - postgres

  vhdl-worker:
    build:
      context: ./bitlab-backend-qnx-vm
      dockerfile: Dockerfile.vhdl
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_LISTENER_ENABLED=true
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/myapp
    depends_on:
      - kafka
      - postgres

  frontend:
    build:
      context: ./frontend-verilog-qnx-fledged
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
